<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Structure Lab - Card Home + Dual Drawers Chat</title>
  <link rel="stylesheet" href="./shared/base.css" />
  <link rel="stylesheet" href="./styles.css?v=settings-layout-20260219-26" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-left">
        <button id="globalMenuBtn" class="chrome-btn" aria-label="Open sidebar">☰</button>
        <button id="titleHomeBtn" class="title-btn" aria-label="Go to home">
          <h1>Risuai Concept</h1>
          <p class="small-muted" id="topbarSubtitle">Character Library</p>
        </button>
      </div>
      <div class="topbar-right">
        <input class="control-field topbar-search hidden" id="shellSearchInput" type="search" placeholder="Search" />
        <button id="topSidebarBtn" class="chrome-btn hidden" aria-label="Open workspace sidebar">Sidebar +</button>
      </div>
    </header>

    <main class="stage">
      <aside id="globalDrawer" class="drawer drawer-global drawer-elevation--left">
        <!-- Intentional asymmetry: global drawer close stays left, context drawer close stays right. -->
        <div class="drawer-head drawer-head-left">
          <button id="closeGlobalDrawerBtn" class="chrome-btn drawer-close-btn drawer-close-left" aria-label="Close global sidebar">✕</button>
          <h2>Workspace</h2>
        </div>
        <div class="drawer-body">
          <div class="drawer-list">
            <button class="item-btn active" data-workspace-view="characters">Characters</button>
            <button class="item-btn" data-workspace-view="library">Library</button>
            <button class="item-btn" data-workspace-view="playground">Playground</button>
            <button class="item-btn" data-workspace-view="settings">Settings</button>
          </div>
          <section class="drawer-section">
            <h3 class="drawer-section-title">Recent Chats</h3>
            <div id="globalRecentChatsList" class="drawer-list compact"></div>
          </section>
        </div>
      </aside>

      <section id="homeView" class="view view-home">
        <section id="characterGrid" class="character-grid"></section>
      </section>

      <section id="chatView" class="view view-chat hidden">
        <section class="chat-core card panel-shell">
          <div class="chat-core-top">
            <div>
              <h2 id="chatTitle">Chat</h2>
              <p class="small-muted" id="chatMeta">Meta</p>
            </div>
          </div>

          <div id="messageList" class="message-list"></div>

          <div class="composer">
            <textarea class="control-field" id="composerInput" rows="2" placeholder="Type a message... (Enter to send, Shift+Enter for newline)"></textarea>
            <button id="sendBtn" class="item-btn active send-btn">Send</button>
          </div>
        </section>

        <aside id="contextDrawer" class="drawer drawer-chat-right drawer-elevation--right">
          <div class="drawer-head drawer-head-right">
            <h2>Workspace Sidebar</h2>
            <button id="closeContextDrawerBtn" class="chrome-btn drawer-close-btn drawer-close-right" aria-label="Close workspace sidebar">✕</button>
          </div>
          <section id="sidebarProfileBlock" class="sidebar-profile-block">
            <div id="sidebarProfileAvatar" class="sidebar-profile-avatar" aria-hidden="true">?</div>
            <div class="sidebar-profile-meta">
              <h3 id="sidebarProfileName">Unknown Character</h3>
              <p id="sidebarProfileArchetype" class="small-muted">No archetype</p>
              <p id="sidebarProfileChat" class="small-muted">No active chat</p>
            </div>
          </section>
          <div class="sidebar-main">
            <div id="sidebarModeStrip" class="sidebar-mode-strip"></div>
            <div id="sidebarContent" class="drawer-list"></div>
          </div>
        </aside>
      </section>

      <section id="libraryView" class="rag-dashboard hidden">
        <div class="rag-dashboard-body">
          <aside class="rag-sidebar">
            <section class="rag-sidebar-section">
              <h3 class="rag-sidebar-title">Library</h3>
              <div id="librarySystemList" class="rag-system-list"></div>
            </section>

            <div class="ds-settings-divider"></div>

            <section class="rag-sidebar-section">
              <h3 class="rag-sidebar-title">RAG Defaults</h3>
              <div class="rag-sidebar-config">
                <div class="rag-setting-field">
                  <span class="rag-label">Embedding Model</span>
                  <input class="control-field" type="text" value="nomic-embed-text-v1.5" readonly />
                </div>
                <div class="rag-setting-field">
                  <span class="rag-label">Top K Chunks</span>
                  <input class="control-field" type="text" value="3" readonly />
                </div>
                <div class="rag-setting-field">
                  <span class="rag-label">Min Similarity</span>
                  <input class="control-field" type="text" value="0.1" readonly />
                </div>
                <div class="rag-setting-field">
                  <span class="rag-label">Token Budget</span>
                  <input class="control-field" type="text" value="2048" readonly />
                </div>
              </div>
            </section>

            <div class="rag-sidebar-footer">
              <div id="libraryStats" class="rag-stats">0 Books</div>
            </div>
          </aside>

          <main class="rag-main-content">
            <div class="rag-toolbar">
              <div class="rag-toolbar-left">
                <span id="libraryToolbarInfo" class="rag-toolbar-info">Showing 0 rulebooks</span>
              </div>
              <div class="rag-toolbar-right">
                <div class="rag-view-toggle">
                  <button id="libraryGridBtn" class="chrome-btn rag-toggle-btn active" aria-label="Grid view">▦</button>
                  <button id="libraryListBtn" class="chrome-btn rag-toggle-btn" aria-label="List view">☰</button>
                </div>
                <button class="item-btn rag-add-doc-btn">+ Add Documents</button>
              </div>
            </div>

            <div id="libraryContentArea" class="rag-content-area is-grid"></div>
          </main>
        </div>

        <div id="libraryStagingDrawer" class="rag-staging-drawer hidden">
          <div class="rag-staging-header">
            <div class="rag-staging-title">
              <span>ⓘ</span>
              <span>Staging Area: 0 files pending</span>
            </div>
            <div class="rag-staging-batch-meta">
              <input class="control-field" type="text" placeholder="Batch System" />
              <input class="control-field" type="text" placeholder="Batch Edition" />
            </div>
            <div class="rag-staging-actions">
              <button class="item-btn">Start Ingestion</button>
              <button class="chrome-btn" aria-label="Close staging area">✕</button>
            </div>
          </div>
          <div class="rag-staging-list"></div>
        </div>

        <div id="libraryStatusToast" class="rag-status-toast hidden">
          <div class="panel-shell rag-status-card">
            <div class="rag-status-header">
              <div class="rag-status-title-row">
                <div class="ds-chat-spinner-sm"></div>
                <span class="rag-status-label">EMBEDDING</span>
              </div>
              <span class="rag-status-counter">File 0 of 0</span>
            </div>
            <div class="rag-status-body">
              <span class="rag-status-filename">Processing...</span>
              <div class="rag-mini-bar-track">
                <div class="rag-mini-bar-fill" style="width:0%"></div>
              </div>
              <div class="rag-status-meta">
                <span>0%</span>
                <span>0/0</span>
              </div>
            </div>
            <button class="icon-btn rag-status-cancel" aria-label="Cancel ingestion" title="Cancel Ingestion">✕</button>
          </div>
        </div>
      </section>

      <section id="playgroundView" class="view playground-shell hidden">
        <div class="playground-frame card panel-shell">
          <div id="playgroundContent" class="playground-content"></div>
        </div>
      </section>

      <section id="settingsView" class="ds-settings-shell ds-settings-shell-bg hidden">
        <div class="ds-settings-shell-inner">
          <div id="settingsNavPanel" class="ds-settings-nav-panel ds-settings-nav-shell ds-settings-nav-shell-desktop-bg"></div>
          <div id="settingsContentPanel" class="ds-settings-content-panel ds-settings-content-shell"></div>
        </div>
      </section>
    </main>

    <div id="scrim" class="scrim hidden"></div>
  </div>

  <script src="./shared/data.js"></script>
  <script src="./app.js?v=settings-layout-20260219-26"></script>
</body>
</html>
