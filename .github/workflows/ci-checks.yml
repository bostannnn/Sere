name: CI Checks

on:
  pull_request:
  push:
    branches:
      - main
      - production

jobs:
  test-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm lint --max-warnings 0

      - name: Type check
        run: pnpm check

      - name: Unit tests
        run: pnpm test

      - name: Server static checks
        run: pnpm run check:server

      - name: Server contract checks
        run: pnpm run check:server:contracts
